<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Pluma - Faça login para acessar sua jornada de bem-estar emocional.">
    <meta name="theme-color" content="#73f59f">
    
    <title>Pluma - Login</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="login-page">
    <div class="login-container">
        <!-- Logo e Header -->
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-feather-alt"></i>
            </div>
            <h1 class="login-title">Bem-vindo à Pluma</h1>
            <p class="login-subtitle">Sua jornada de bem-estar emocional começa aqui</p>
        </div>

        <!-- Formulário de Login -->
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        placeholder="Seu email"
                        autocomplete="email"
                        required
                    >
                </div>
                <span class="form-error" id="emailError">Por favor, insira um email válido</span>
            </div>
            
            <div class="form-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock"></i>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        placeholder="Sua senha"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar senha">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span class="form-error" id="passwordError">A senha deve ter pelo menos 6 caracteres</span>
            </div>

            <!-- Opções -->
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Lembrar-me</span>
                </label>
                <a href="#" class="forgot-password" id="forgotPassword">Esqueceu a senha?</a>
            </div>

            <!-- Botão de Login -->
            <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                Entrar
            </button>
        </form>

        <!-- Divisor -->
        <div class="login-divider">
            <span></span>
            <p>ou continue com</p>
            <span></span>
        </div>

        <!-- Login Social -->
        <div class="social-login">
            <button class="social-btn google" id="googleLogin">
                <i class="fab fa-google"></i>
                Google
            </button>
            <button class="social-btn apple" id="appleLogin">
                <i class="fab fa-apple"></i>
                Apple
            </button>
        </div>

        <!-- Link de Cadastro -->
        <p class="register-link">
            Não tem uma conta? <a href="#" id="registerLink">Cadastre-se</a>
        </p>

        <!-- Aviso -->
        <div class="disclaimer mt-lg">
            <p class="disclaimer-text" style="font-size: 0.75rem;">
                Ao entrar, você concorda com nossos Termos de Uso e Política de Privacidade.
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/login.js"></script>
</body>
</html>
